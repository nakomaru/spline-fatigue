<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Spline torsional-fatigue explorer</title>
<style>
  :root { --bg:#f4f5f7; --card:#fff; --ink:#1c2330; --mut:#6b7280; --line:#e3e6ea;
          --blue:#2563eb; --red:#dc2626; --green:#16a34a; --gold:#d97706; }
  * { box-sizing:border-box; }
  body { margin:0; font:13px/1.5 system-ui,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",sans-serif; color:var(--ink); background:var(--bg); }
  header { padding:12px 18px; background:#fff; color:var(--ink); border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
  header h1 { margin:0; font-size:16px; } header .sub { margin:4px 0 0; color:var(--mut); font-size:12px; }
  header .btns { display:flex; gap:8px; }
  header button { font:12px system-ui; padding:6px 11px; border:1px solid var(--line); background:#fff; color:var(--ink); border-radius:6px; cursor:pointer; }
  header button:hover { background:#eef2ff; }
  .layout { display:grid; grid-template-columns:360px 1fr; gap:14px; padding:14px; align-items:start; }
  .panel { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:10px 12px; }
  .panel.sticky { position:sticky; top:14px; max-height:calc(100vh - 28px); overflow:auto; }
  h2.grp { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--mut);
           margin:14px 0 6px; border-bottom:1px solid var(--line); padding-bottom:3px; }
  .ctrl { margin:9px 0; }
  .ctrl label { display:flex; justify-content:space-between; font-size:12px; gap:8px; }
  .ctrl label .nm { font-weight:600; } .ctrl label .un { color:var(--mut); white-space:nowrap; }
  .sym { color:var(--blue); font-family:"Cambria Math",Georgia,serif; font-weight:600; margin-left:5px; }
  .ctrl .row { display:flex; gap:6px; align-items:center; }
  .ctrl input[type=range] { flex:1; }
  .ctrl input[type=number] { width:74px; font:12px monospace; padding:2px 4px; border:1px solid var(--line); border-radius:4px; }
  .ctrl select { font:12px system-ui; padding:2px 4px; border:1px solid var(--line); border-radius:4px; background:#fff; }
  .ctrl .hint { color:var(--mut); font-size:11px; margin-top:2px; }
  .ctrl .eff { font-size:11px; font-weight:600; margin-top:2px; }
  .ctrl .eff.up { color:#15803d; }      /* raising this input → longer life */
  .ctrl .eff.down { color:#b91c1c; }    /* raising this input → shorter life */
  .ctrl .eff.neutral { color:#6b7280; } /* little or mixed effect on life */
  .modal-bg { position:fixed; inset:0; background:rgba(8,12,22,0.55); display:none; align-items:center; justify-content:center; z-index:50; }
  .modal-bg.show { display:flex; }
  .modal { background:#fff; border-radius:12px; padding:18px 20px; max-width:380px; width:90%; box-shadow:0 18px 50px rgba(0,0,0,0.3); }
  .modal h3 { margin:0 0 8px; font-size:15px; }
  .modal p { margin:0 0 16px; color:#374151; font-size:13px; }
  .modal .actions { display:flex; gap:8px; justify-content:flex-end; }
  .modal button { font:13px system-ui; padding:7px 14px; border-radius:7px; cursor:pointer; border:1px solid var(--line); }
  .modal button.cancel { background:#fff; color:var(--ink); }
  .modal button.cancel:hover { background:#f3f4f6; }
  .modal button.confirm { background:#dc2626; color:#fff; border-color:#dc2626; }
  .modal button.confirm:hover { background:#b91c1c; }
  .panel h3.rh { margin:2px 0 8px; font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--mut); }
  .readout { display:grid; grid-template-columns:repeat(auto-fit,minmax(215px,1fr)); gap:8px; }
  .ro { background:#f8fafc; border:1px solid var(--line); border-radius:8px; padding:8px 10px; }
  .ro .k { font-size:10px; text-transform:uppercase; letter-spacing:.04em; color:var(--mut); }
  .ro .v { font-size:16px; font-weight:700; font-variant-numeric:tabular-nums; color:var(--ink); }
  .ro .v.warn { color:#b45309; } .ro .v.bad { color:#b91c1c; } .ro .v.good { color:#15803d; }
  .ro .f { font-family:"Cambria Math",Georgia,serif; font-size:11px; color:#42506a; background:#eef2f7;
           border-radius:4px; padding:2px 5px; margin-top:4px; display:block; }
  .ro .c { font-size:10.5px; color:#64748b; margin-top:3px; line-height:1.35; }
  .story { background:#fff7ed; border:1px solid #fed7aa; border-radius:8px; padding:9px 11px; margin-top:10px; font-size:12.5px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(370px,1fr)); gap:14px; margin-top:14px; }
  .chart { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:8px 10px 10px; }
  .chart canvas { width:100%; height:230px; display:block; }
  .chart .cap { font-size:11.5px; color:#374151; margin-top:6px; }
  .chart .eq { font-family:"Cambria Math",Georgia,serif; background:#f1f5f9; border-radius:5px;
               padding:3px 6px; display:inline-block; margin-top:5px; font-size:12px; }
</style>
</head>
<body>
<header>
  <div><h1 id="appTitle"></h1><div class="sub" id="appSub"></div></div>
  <div class="btns"><button id="lang"></button><button id="reset"></button></div>
</header>

<div class="layout">
  <div class="panel sticky" id="controls"></div>
  <div>
    <div class="panel">
      <h3 class="rh" id="roHead"></h3>
      <div class="readout" id="readout"></div>
      <div class="story" id="story"></div>
    </div>
    <div class="grid" id="charts"></div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <p id="modalMsg"></p>
    <div class="actions">
      <button class="cancel" id="modalCancel"></button>
      <button class="confirm" id="modalConfirm"></button>
    </div>
  </div>
</div>

<script src="physics.js"></script>
<script src="plot.js"></script>
<script>
"use strict";

/* ===================== controls ======================================
   slider: {kind:"slider",key,min,max,step,unit,sym, en:{label,hint,eff}, ja:{...}}
   coef:   {kind:"coef",key,unit,sym, en:{label,hint,eff}, ja:{...},
            manualField,manualMin,manualMax,manualStep,
            options:[{id, en, ja, set:{stateField:value}, manual?:true}]}
   "coef" controls let the engineer pick how a coefficient is found (auto from
   geometry/finish, or manual). The resolved value appears in the panel above
   with its formula and caveats. ==================================== */
const slider = (key,min,max,step,unit,sym,en,ja) => ({kind:"slider",key,min,max,step,unit,sym,en,ja});

const GROUPS = [
  { en:"Spline geometry", ja:"スプライン形状", items:[
    slider("PCD",30,120,0.5,"mm","PCD",
      {label:"Pitch circle dia PCD",hint:"Pitch diameter of the spline; radius r = PCD/2 carries the torque. Module m = PCD/N is derived. Larger PCD → larger r and, at fixed N, bigger teeth.",
       eff:"↑ PCD → bigger radius & teeth → lower tooth force → ↑ life"},
      {label:"基準円直径 PCD",hint:"スプラインの基準円直径。半径 r = PCD/2 がトルクを伝える。モジュール m = PCD/N は従属。PCD が大きいほど r が大きく、N 一定なら歯も大きい。",
       eff:"PCD↑ → 半径・歯が大 → 歯面力↓ → 寿命↑"}),
    slider("N",10,60,1,"","N",
      {label:"Tooth count N",hint:"Teeth at the fixed PCD; m = PCD/N. More teeth share the load (∝1/N) but are smaller (root thickness s_F shrinks) and stiffen the mesh (k_θ ∝ N, shorter L_eff). Net life falls as N rises.",
       eff:"↑ N → smaller teeth + stiffer mesh → ↓ life"},
      {label:"歯数 N",hint:"固定 PCD の歯数。m = PCD/N。歯数が多いほど分担は増える(∝1/N)が、歯は小さく(歯元厚 s_F 減)、結合は剛く(k_θ∝N, L_eff 減)。差引きで寿命は下がる。",
       eff:"N↑ → 歯が小・結合剛 → 寿命↓"}),
    slider("eng_pct",20,100,1,"%","n_c",
      {label:"Teeth engaged %",hint:"Fraction of the N teeth actually sharing load. Ideally 100%; pitch/index error or misalignment drops it. Engaged count n_c = % × N is shown in the panel.",
       eff:"↑ engagement → more teeth share → lower per-tooth load → ↑ life"},
      {label:"かみあい率 %",hint:"N 枚のうち実際に荷重を分担する割合。理想は 100%。ピッチ・割出誤差や芯ずれで低下。かみあい歯数 n_c = % × N はパネルに表示。",
       eff:"かみあい率↑ → 分担歯数↑ → 1歯荷重↓ → 寿命↑"}),
    slider("phi",14.5,45,0.5,"deg","&alpha;",
      {label:"Pressure angle",hint:"Angle of the line of action. Splits the flank-normal load into tangential (W_t, torque) and radial (W_r = W_t·tan α, opens the sleeve). It thickens the involute root section (s_F grows with α), and feeds the flank contact pressure (∝1/cos α → fretting), the fillet K_f, and the sleeve bursting.",
       eff:"↑ α → thicker, stronger root (outweighs the contact penalty) → ↑ life; but ↑ bursting"},
      {label:"圧力角",hint:"作用線の角度。歯面法線力を接線(W_t,トルク)と半径(W_r=W_t·tanα,スリーブを押し広げる)に分ける。歯元のインボリュート断面を厚くし(s_F は α とともに増)、歯面接触圧(∝1/cosα→フレッティング)、歯元 K_f、スリーブ拡張にも効く。",
       eff:"α↑ → 歯元が厚く強く（接触の不利を上回る）→ 寿命↑；ただし拡張↑"}),
    slider("L",8,90,0.5,"mm","L",
      {label:"Engagement length L",hint:"Physical overlap of the splines. Only the first ~3/β of it actually carries load (see L_eff).",
       eff:"↑ L → ↑ L_eff up to the 1/β plateau → ↑ tooth life"},
      {label:"かみあい長さ L",hint:"スプラインの重なり長さ。実際に荷重を担うのは端から約 3/β まで（L_eff 参照）。",
       eff:"L↑ → 1/β の頭打ちまで L_eff↑ → 歯の寿命↑"}),
    slider("r_fillet",0.05,3,0.05,"mm","r_f",
      {label:"Root fillet radius",hint:"Fillet radius at the tooth/shaft root. Blunts the notch: a bigger radius lowers both the tooth fillet K_f and the shaft root K_t.",
       eff:"↑ fillet → lower K_f & K_t → ↑ life"},
      {label:"歯底すみ肉半径",hint:"歯元・軸歯底のすみ肉半径。切欠きを緩める：大きいほど歯元 K_f と軸歯底 K_t がともに下がる。",
       eff:"すみ肉↑ → K_f・K_t↓ → 寿命↑"}),
    { kind:"coef", key:"h_work", unit:"mm", sym:"h_work", manualField:"hwork_manual", manualMin:0.2, manualMax:8, manualStep:0.05,
      en:{label:"Working depth h_work",hint:"Engaged flank height (radial). Sets the contact pressure and is the basis for the root section and load arm. Auto uses the ISO 4156 nominal (≈ module); switch to manual to enter the value off the print.",eff:"mixed: less contact pressure but a longer bending lever"},
      ja:{label:"有効歯丈 h_work",hint:"かみあう歯面の半径方向高さ。接触圧を決め、歯元断面と荷重腕の基準になる。自動は ISO 4156 公称(≈モジュール)。図面値は手動で入力。",eff:"混在：面圧は下がるが曲げレバーは伸びる"},
      options:[ {id:"auto",en:"auto: ≈ module",ja:"自動: ≈ モジュール",set:{hwork_mode:"auto"}},
                {id:"manual",en:"manual (mm)",ja:"手動 (mm)",set:{hwork_mode:"manual"},manual:true} ] },
    { kind:"coef", key:"s_base", unit:"mm", sym:"s_F", manualField:"sbase_manual", manualMin:0.5, manualMax:12, manualStep:0.05,
      en:{label:"Root thickness s_F",hint:"Tooth thickness at the root critical section — the bending section (strength ∝ s_F²). Auto computes the involute chordal thickness at the root-form circle from m, N, α; switch to manual for the measured value.",eff:"↑ thickness → stronger teeth → ↑ tooth life"},
      ja:{label:"歯元厚 s_F",hint:"歯元危険断面の歯厚＝曲げ断面(強さ∝s_F²)。自動は m,N,α から歯底円のインボリュート弦厚を計算。実測値は手動。",eff:"厚さ↑ → 歯が丈夫 → 歯の寿命↑"},
      options:[ {id:"auto",en:"auto: involute @ root",ja:"自動: 歯底インボリュート",set:{sbase_mode:"auto"}},
                {id:"manual",en:"manual (mm)",ja:"手動 (mm)",set:{sbase_mode:"manual"},manual:true} ] },
    { kind:"coef", key:"h_load", unit:"mm", sym:"h_F", manualField:"hload_manual", manualMin:0.2, manualMax:10, manualStep:0.05,
      en:{label:"Load arm h_F",hint:"Bending moment arm from the root section to where the resultant flank load acts. Pick the load position (pitch-line typical, tip = worst case) or enter it directly.",eff:"↑ arm → more root bending → ↓ tooth life"},
      ja:{label:"荷重腕 h_F",hint:"歯元断面から合力作用点までの曲げモーメント腕。荷重位置(基準円が標準、歯先が最悪)を選ぶか直接入力。",eff:"腕↑ → 歯元曲げ↑ → 歯の寿命↓"},
      options:[ {id:"pitch",en:"pitch-line (typical)",ja:"基準円（標準）",set:{hload_mode:"pitch"}},
                {id:"hpstc",en:"HPSTC",ja:"単対かみあい上端",set:{hload_mode:"hpstc"}},
                {id:"tip",en:"tip (worst case)",ja:"歯先（最悪）",set:{hload_mode:"tip"}},
                {id:"manual",en:"manual (mm)",ja:"手動 (mm)",set:{hload_mode:"manual"},manual:true} ] },
  ]},
  { en:"Load spread (shear-lag)", ja:"荷重分布（シアラグ）", items:[
    { kind:"coef", key:"cp", unit:"N/mm/&micro;m", sym:"c_p", manualField:"cp_manual", manualMin:2, manualMax:40, manualStep:0.5,
      en:{label:"Mesh stiffness c_p",hint:"Tangential tooth-pair stiffness per mm of face. THE driver of load concentration: higher c_p → shorter 1/β → load bunches at the bite edge. Auto uses the ISO 6336 single-mesh value, or enter a manual/FE-extracted value.",eff:"↑ c_p → load bunches (↓ L_eff) → ↓ tooth life"},
      ja:{label:"かみあい剛性 c_p",hint:"単位歯幅あたりの接線剛性。荷重集中の最大要因：大きいほど 1/β が短く端に集中。自動は ISO 6336 単一かみあい値、または手動/FE 値。",eff:"c_p↑ → 集中(L_eff↓) → 歯の寿命↓"},
      options:[ {id:"iso",en:"auto: ISO 6336 c'",ja:"自動: ISO 6336 c'",set:{cp_mode:"iso"}},
                {id:"manual",en:"manual",ja:"手動",set:{cp_mode:"manual"},manual:true} ] },
    slider("d_root",20,90,0.1,"mm","d",
      {label:"Shaft spline root dia",hint:"The shaft's torsional cross-section and stiffness GJ_s. Shaft shear = K_t·16T/(πd³), so small changes move the shaft-inward capacity strongly; a stiffer shaft also spreads the load.",
       eff:"↑ dia → lower shaft stress → ↑ shaft life (failure shifts to teeth)"},
      {label:"軸スプライン歯底径",hint:"軸のねじり断面と剛性 GJ_s。軸せん断 = K_t·16T/(πd³)。わずかな変化で軸内向き耐力が大きく動き、剛い軸は荷重も分散。",
       eff:"径↑ → 軸応力↓ → 軸の寿命↑（破壊は歯側へ）"}),
    slider("sleeve_OD",40,160,0.5,"mm","R_o",
      {label:"Sleeve OD",hint:"Outer diameter of the side gear/sleeve, setting its stiffness GJ. In shear-lag the COMPLIANT member drives concentration, so a stiffer sleeve spreads the load more evenly (lowers β).",
       eff:"↑ OD → stiffer sleeve → lower β → ↑ L_eff (load spreads)"},
      {label:"スリーブ外径",hint:"サイドギア/スリーブの外径で剛性 GJ を決める。シアラグでは柔らかい部材が集中を生むため、剛いほど荷重は均一に分散(β↓)。",
       eff:"外径↑ → 剛性↑ → β↓ → L_eff↑（分散）"}),
    slider("sleeve_bore",25,100,0.5,"mm","R_i",
      {label:"Sleeve bore",hint:"Internal-spline minor diameter. A bigger bore thins the wall → softer sleeve → raises β → load concentrates (shorter L_eff). Also thins the rim for bursting.",
       eff:"↑ bore → softer/thinner sleeve → ↓ L_eff & ↑ bursting"},
      {label:"スリーブ内径",hint:"内歯スプライン歯先円径。大きいほど肉薄・柔らかく β を上げ荷重集中(L_eff↓)。拡張に対するリムも薄くなる。",
       eff:"内径↑ → 柔・薄 → L_eff↓・拡張↑"}),
    slider("G",60000,90000,1000,"MPa","G",
      {label:"Shear modulus G",hint:"Steel ≈ 80 GPa. Enters every torsional stiffness GJ; β ∝ 1/√G, so stiffer members spread the load.",
       eff:"↑ G → stiffer members → smaller β → ↑ L_eff (load spreads)"},
      {label:"横弾性係数 G",hint:"鋼は約 80 GPa。すべてのねじり剛性 GJ に含まれ β ∝ 1/√G。剛いほど分散。",
       eff:"G↑ → 剛性↑ → β↓ → L_eff↑（分散）"}),
  ]},
  { en:"Stress concentration", ja:"応力集中", items:[
    { kind:"coef", key:"Kt", unit:"", sym:"K_t", manualField:"Kt_manual", manualMin:1, manualMax:6, manualStep:0.05,
      en:{label:"Shaft root K_t (torsion)",hint:"Torsion stress-concentration at the shaft spline-root fillet — the main lever on shaft-inward cracking. Enter a Peterson/FE value (recommended), or use the Neuber estimate from the fillet radius.",eff:"↑ K_t → ↑ shaft stress → ↓ shaft life"},
      ja:{label:"軸歯底 K_t（ねじり）",hint:"軸スプライン歯底すみ肉のねじり応力集中＝軸内向き亀裂の主要因。Peterson/FE 値の入力を推奨、またはすみ肉半径からの Neuber 推定。",eff:"K_t↑ → 軸応力↑ → 軸の寿命↓"},
      options:[ {id:"manual",en:"manual (chart / FE)",ja:"手動（チャート/FE）",set:{Kt_mode:"manual"},manual:true},
                {id:"auto",en:"estimate (Neuber)",ja:"推定（Neuber）",set:{Kt_mode:"auto"}} ] },
  ]},
  { en:"Material", ja:"材料", items:[
    slider("UTS",800,2200,10,"MPa","&sigma;_u",
      {label:"Tensile strength UTS",hint:"Ultimate strength. All fatigue strengths scale from it (endurance ≈ 0.42·UTS bending, 0.29·UTS torsion).",
       eff:"↑ UTS → stronger material → ↑ life (all modes)"},
      {label:"引張強さ UTS",hint:"引張強さ。すべての疲労強さがこれに比例（耐久限 ≈ 曲げ 0.42·UTS、ねじり 0.29·UTS）。",
       eff:"UTS↑ → 材料が強い → 寿命↑（全モード）"}),
    { kind:"coef", key:"surf", unit:"", sym:"C_surf", manualField:"surf_manual", manualMin:0.3, manualMax:1, manualStep:0.01,
      en:{label:"Surface / size factor",hint:"Marin endurance knockdown k_a·k_b. Pick the surface finish (drives k_a with UTS); size k_b comes from d. As-forged surfaces are far harsher than machined/ground.",eff:"↑ factor → higher endurance → ↑ life"},
      ja:{label:"表面・寸法係数",hint:"Marin 耐久低減 k_a·k_b。仕上げを選ぶと k_a(UTS依存)が決まり、寸法 k_b は d から。鍛造肌は機械/研削より大幅に厳しい。",eff:"係数↑ → 耐久限↑ → 寿命↑"},
      options:[ {id:"ground",en:"ground",ja:"研削",set:{finish:"ground",surf_mode:"auto"}},
                {id:"machined",en:"machined",ja:"機械加工",set:{finish:"machined",surf_mode:"auto"}},
                {id:"hotrolled",en:"hot-rolled",ja:"熱間圧延",set:{finish:"hotrolled",surf_mode:"auto"}},
                {id:"forged",en:"as-forged",ja:"鍛造肌",set:{finish:"forged",surf_mode:"auto"}},
                {id:"manual",en:"manual",ja:"手動",set:{surf_mode:"manual"},manual:true} ] },
    { kind:"coef", key:"b", unit:"", sym:"b", manualField:"b_manual", manualMin:-0.14, manualMax:-0.04, manualStep:0.005,
      en:{label:"Basquin exponent b",hint:"Slope of the S-N line. Auto estimates it from UTS (Shigley f-factor); enter the measured slope if you have S-N data. More negative → life drops faster with load.",eff:"more negative → life more load-sensitive"},
      ja:{label:"Basquin 指数 b",hint:"S-N 線の勾配。自動は UTS から推定(Shigley f係数)。S-N データがあれば実測勾配を入力。負に大きいほど荷重に敏感。",eff:"負に大 → 寿命が荷重に敏感"},
      options:[ {id:"auto",en:"auto: estimate",ja:"自動: 推定",set:{b_mode:"auto"}},
                {id:"manual",en:"manual",ja:"手動",set:{b_mode:"manual"},manual:true} ] },
  ]},
  { en:"Direction knockdowns", ja:"方向別の低減係数", items:[
    slider("fret_anchor",2,40,0.5,"MPa&middot;&micro;m","&Phi;_50",
      {label:"Fretting anchor Φ_50",hint:"Calibration: the FFDP severity at which unidirectional fretting halves the flank fatigue strength. Lower Φ_50 → more fretting-sensitive. Anchor it to a fretting-fatigue test; the uni/bi factors are then computed from the live FFDP.",
       eff:"↑ Φ_50 → less fretting knockdown → ↑ life"},
      {label:"フレッティング基準 Φ_50",hint:"較正値：片方向フレッティングが歯面疲労強さを半減させる FFDP 値。小さいほど敏感。フレッティング試験で較正すると、片/両方向係数は FFDP から計算される。",
       eff:"Φ_50↑ → フレッティング低減↓ → 寿命↑"}),
    slider("mxax_uni",0.6,1.0,0.05,"","k_ax,u",
      {label:"Shaft multiaxial (uni)",hint:"Critical-plane knockdown for unidirectional torsion (one tensile plane). Empirical; calibrate to test.",
       eff:"↑ value → stronger shaft → ↑ shaft life"},
      {label:"軸の多軸係数（片）",hint:"片方向ねじりの臨界面低減（引張面1つ）。経験値、試験で較正。",
       eff:"値↑ → 軸が強い → 軸の寿命↑"}),

         ` Bidirectional life is about <b>${(R.lifeUni/Math.max(R.lifeBi,1)).toFixed(0)}x shorter</b> than unidirectional here.` },
  ja:{ title:"スプラインねじり疲労エクスプローラ",
       sub:"左に実際のスプライン諸元を入力。係数はパネルで自動計算（式付き）。設定はこのブラウザに保存。",
       roHead:"計算パラメータ（各項目の下に式と注意）",
       reset:"既定値にリセット", lang:"English",
       modalTitle:"既定値にリセットしますか？",
       modalMsg:"保存した設定を消去し、一般的な既定値に戻します。言語設定は保持されます。",
       confirm:"リセット", cancel:"キャンセル",
       story:(R,inBand,below)=>`有効長さ L_eff = <b>${R.Leff.toFixed(1)} mm</b> では、片方向は<b>${GOVT.ja[R.govUni]}</b>、両方向は<b>${GOVT.ja[R.govBi]}</b>で破壊します。` +
         (inBand ? "ここは2つの荷重方向で破壊モードが異なる<b>帯域の内側</b>です。" :
          below ? "両方向とも歯がせん断破壊します（荷重が集中しすぎて軸に伝わらない）。" :
                  "両方向とも軸が半径方向内向きに割れます（荷重がよく分散）。") +
         `ここでは両方向の寿命は片方向の約 <b>${(R.lifeUni/Math.max(R.lifeBi,1)).toFixed(0)} 分の1</b> です。` },
};

/* ===================== state + persistence ===================== */
const LS_STATE="spline_explorer_state_v3", LS_LANG="spline_explorer_lang_v1";
const DEFAULTS = {
  PCD:60, N:24, eng_pct:100, phi:30, L:40, r_fillet:0.45,
  hwork_mode:"auto", hwork_manual:2.25,
  sbase_mode:"auto", sbase_manual:4.0,
  hload_mode:"pitch", hload_manual:2.0,
  cp_mode:"iso", cp_manual:14,
  d_root:57, sleeve_OD:95, sleeve_bore:58, G:80000,
  Kt_mode:"manual", Kt_manual:3.0,
  UTS:1500, finish:"machined", surf_mode:"auto", surf_manual:0.85,
  b_mode:"auto", b_manual:-0.085,
  fret_anchor:12, mxax_uni:1.0, mxax_bi:0.85,
  T:1500, slip0:0.6, mu:0.30,
};
let state=Object.assign({},DEFAULTS), lang="en";
try { const s=JSON.parse(localStorage.getItem(LS_STATE)); if(s&&typeof s==="object") Object.assign(state,s); } catch(e){}
const slng=localStorage.getItem(LS_LANG); if(slng==="en"||slng==="ja") lang=slng;
function save(){ try{ localStorage.setItem(LS_STATE,JSON.stringify(state)); localStorage.setItem(LS_LANG,lang);}catch(e){} }

/* ===================== helpers ===================== */
const C={blue:"#2563eb",red:"#dc2626",green:"#16a34a",gold:"#d97706",black:"#111827",gray:"#9ca3af",orange:"#ea580c"};
function eng(v){ if(!isFinite(v))return"–"; if(v<1)return"<1"; if(v>=1e6)return(v/1e6).toFixed(v>=1e7?0:1)+"M"; if(v>=1e3)return(v/1e3).toFixed(v>=1e4?0:1)+"k"; return v.toFixed(0); }
/* turn x_word into x<sub>word</sub> for DOM text (canvas labels use plain forms) */
function sub(s){ return s==null?s:String(s).replace(/_([A-Za-z0-9αβγθ,]*[A-Za-z0-9αβγθ])/g,"<sub>$1</sub>"); }
function txt(x){ return typeof x==="function" ? x(state) : x; }
function coefCurrent(it){
  for(const o of it.options){ let ok=true; for(const k in o.set){ if(state[k]!==o.set[k]){ok=false;break;} } if(ok) return o.id; }
  return it.options[0].id;
}

/* ===================== build UI (rebuilt on language switch / coef change) ===================== */
const CV={};
function buildUI(){
  document.documentElement.lang = lang;
  document.getElementById("appTitle").textContent = STR[lang].title;
  document.getElementById("appSub").textContent = STR[lang].sub;
  document.getElementById("roHead").textContent = STR[lang].roHead;
  document.getElementById("reset").textContent = STR[lang].reset;
  document.getElementById("lang").textContent = STR[lang].lang;
  document.getElementById("modalTitle").textContent = STR[lang].modalTitle;
  document.getElementById("modalMsg").textContent = STR[lang].modalMsg;
  document.getElementById("modalConfirm").textContent = STR[lang].confirm;
  document.getElementById("modalCancel").textContent = STR[lang].cancel;

  const ctn=document.getElementById("controls"); ctn.innerHTML="";
  GROUPS.forEach(g=>{
    const h=document.createElement("h2"); h.className="grp"; h.textContent=g[lang]; ctn.appendChild(h);
    g.items.forEach(it=>{
      const L=it[lang], symHtml = it.sym?`<span class="sym">${it.sym}</span>`:"";
      const effHtml = L.eff?`<div class="eff ${EFFCLS(LIFE_SIGN[it.key]||0)}">${sub(L.eff)}</div>`:"";
      const d=document.createElement("div"); d.className="ctrl";

      if(it.kind==="coef"){
        const cur=coefCurrent(it), curOpt=it.options.find(o=>o.id===cur)||it.options[0];
        const showManual=!!curOpt.manual;
        const opts=it.options.map(o=>`<option value="${o.id}" ${o.id===cur?"selected":""}>${o[lang]}</option>`).join("");
        d.innerHTML=`<label><span class="nm">${L.label}${symHtml}</span><span class="un">${it.unit||""}</span></label>
          <div class="row">
            <select style="flex:1">${opts}</select>
            <input type="number" min="${it.manualMin}" max="${it.manualMax}" step="${it.manualStep}" style="${showManual?"":"display:none"}">
          </div><div class="hint">${sub(L.hint||"")}</div>${effHtml}`;
        ctn.appendChild(d);
        const sel=d.querySelector("select"), num=d.querySelector("input[type=number]");
        if(showManual) num.value=state[it.manualField];
        sel.addEventListener("change",e=>{ const o=it.options.find(x=>x.id===e.target.value); Object.assign(state,o.set); save(); buildUI(); render(); });
        num.addEventListener("input",e=>{ const v=parseFloat(e.target.value); if(!isFinite(v))return; state[it.manualField]=v; save(); render(); });
      } else {
        d.innerHTML=`<label><span class="nm">${L.label}${symHtml}</span><span class="un">${it.unit||""}</span></label>
          <div class="row">
            <input type="range" min="${it.min}" max="${it.max}" step="${it.step}">
            <input type="number" min="${it.min}" max="${it.max}" step="${it.step}">
          </div><div class="hint">${sub(L.hint||"")}</div>${effHtml}`;
        ctn.appendChild(d);
        const rng=d.querySelector("input[type=range]"), num=d.querySelector("input[type=number]");
        rng.value=state[it.key]; num.value=state[it.key];
        const on=e=>{ const v=parseFloat(e.target.value); if(!isFinite(v))return; state[it.key]=v; rng.value=v; num.value=v; save(); render(); };
        rng.addEventListener("input",on); num.addEventListener("input",on);
      }
    });
  });

  const chDiv=document.getElementById("charts"); chDiv.innerHTML="";
  CHARTS.forEach(c=>{
    const cap=c[lang][1];
    const card=document.createElement("div"); card.className="chart";
    card.innerHTML=`<canvas id="cv_${c.id}"></canvas><div class="eq">${sub(c.eq)}</div><div class="cap">${sub(cap)}</div>`;
    chDiv.appendChild(card); CV[c.id]=card.querySelector("canvas");
  });
}

const modalBg=document.getElementById("modalBg");
function openModal(){ modalBg.classList.add("show"); }
function closeModal(){ modalBg.classList.remove("show"); }
document.getElementById("reset").addEventListener("click", openModal);
document.getElementById("modalCancel").addEventListener("click", closeModal);
document.getElementById("modalConfirm").addEventListener("click",()=>{
  state=Object.assign({},DEFAULTS);
  try{ localStorage.removeItem(LS_STATE); }catch(e){}
  closeModal(); buildUI(); render();
});
modalBg.addEventListener("click",e=>{ if(e.target===modalBg) closeModal(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });
document.getElementById("lang").addEventListener("click",()=>{
  lang = lang==="en"?"ja":"en"; save(); buildUI(); render();
});

/* ===================== render ===================== */
function render(){
  const out=Physics.computeAll(state), R=out.readout, ch=out.charts;
  const TT={}; CHARTS.forEach(c=>TT[c.id]=c[lang][0]); // per-chart title on the canvas

  document.getElementById("readout").innerHTML = DERIVED.map(item=>{
    const L=item[lang], cls=item.cls?item.cls(R):"";
    const f=txt(L.f), c=txt(L.c), symHtml=item.sym?` <span class="sym">${item.sym}</span>`:"";
    return `<div class="ro"><div class="k">${sub(L.k)}${symHtml}</div>`+
           `<div class="v ${cls}">${item.v(R,lang)}</div>`+
           (f?`<div class="f">${sub(f)}</div>`:"")+
           (c?`<div class="c">${sub(c)}</div>`:"")+`</div>`;
  }).join("");

  const lo=Math.min(R.xBi||1e9,R.xUni||1e9), hi=Math.max(R.xBi||-1,R.xUni||-1);
  const inBand = R.xBi&&R.xUni&&R.Leff>lo&&R.Leff<hi;
  const below = R.Leff<lo;
  document.getElementById("story").innerHTML = STR[lang].story(R,inBand,below);

  drawPlot(CV.diffusion,{ title:TT.diffusion, xlabel:"x (mm), 0=bite", ylabel:"q (N·m/mm)",
    series:[{x:ch.diffusion.xs,y:ch.diffusion.qx,color:C.blue,width:2,label:"q(x)"}],
    bands:[{x0:0,x1:ch.diffusion.Leff,color:C.green}],
    vlines:[{x:ch.diffusion.Leff,color:C.green,label:"Leff",dash:[5,3]}], ymin:0 });

  drawPlot(CV.leffVsL,{ title:TT.leffVsL, xlabel:"L (mm)", ylabel:"length (mm)",
    series:[{x:ch.leffVsL.Lgrid,y:ch.leffVsL.LeffVsL,color:C.blue,width:2,label:"Leff"},
            {x:ch.leffVsL.Lgrid,y:ch.leffVsL.oneOverBetaLine,color:C.gray,width:1.5,dash:[5,3],label:"1/β"},
            {x:ch.leffVsL.Lgrid,y:ch.leffVsL.Lgrid,color:"#d1d5db",width:1,dash:[2,2],label:"Leff=L"}],
    vlines:[{x:ch.leffVsL.curL,color:C.green,dash:[5,3]}],
    marks:[{x:ch.leffVsL.curL,y:ch.leffVsL.curLeff,color:C.green}], ymin:0 });

  const mc=ch.modeComp;
  drawPlot(CV.modeComp,{ title:TT.modeComp, xlabel:"Leff (mm)", ylabel:"torque capacity (N·m)",
    series:[{x:mc.Le,y:mc.tUni,color:C.blue,width:2,label:"uni tooth"},
            {x:mc.Le,y:mc.tBi,color:C.red,width:2,label:"bi tooth"},
            {x:mc.Le,y:mc.sUni,color:C.blue,width:2,dash:[6,3],label:"uni shaft"},
            {x:mc.Le,y:mc.sBi,color:C.red,width:2,dash:[6,3],label:"bi shaft"}],
    bands:(mc.xUni&&mc.xBi)?[{x0:Math.min(mc.xUni,mc.xBi),x1:Math.max(mc.xUni,mc.xBi),color:C.gold}]:[],
    vlines:[{x:mc.curLeff,color:C.green,label:"Leff",dash:[5,3]}], ymin:0 });

  drawPlot(CV.sn,{ title:TT.sn, xlabel:"cycles Nf", ylabel:"torque (N·m)", xlog:true, xmin:1e3, xmax:1e9,
    series:[{x:ch.sn.tUni.map(d=>d[0]),y:ch.sn.tUni.map(d=>d[1]),color:C.blue,width:2,label:"uni tooth"},
            {x:ch.sn.tBi.map(d=>d[0]),y:ch.sn.tBi.map(d=>d[1]),color:C.red,width:2,label:"bi tooth"},
            {x:ch.sn.sUni.map(d=>d[0]),y:ch.sn.sUni.map(d=>d[1]),color:C.blue,width:2,dash:[6,3],label:"uni shaft"},
            {x:ch.sn.sBi.map(d=>d[0]),y:ch.sn.sBi.map(d=>d[1]),color:C.red,width:2,dash:[6,3],label:"bi shaft"}],
    hlines:[{y:state.T,color:C.green,dash:[4,3]}] });

  const gd=ch.goodman;
  drawPlot(CV.goodman,{ title:TT.goodman, xlabel:"mean stress (MPa)", ylabel:"amplitude (MPa)", xmin:0, xmax:gd.UTS, ymin:0,
    series:[{x:gd.toothLine.map(d=>d[0]),y:gd.toothLine.map(d=>d[1]),color:C.green,width:2,label:"tooth strength"},
            {x:gd.shaftLine.map(d=>d[0]),y:gd.shaftLine.map(d=>d[1]),color:C.black,width:2,label:"shaft strength"}],
    marks:[{x:gd.toothUni[0],y:gd.toothUni[1],color:C.blue},{x:gd.toothBi[0],y:gd.toothBi[1],color:C.red},
           {x:gd.shaftUni[0],y:gd.shaftUni[1],color:"#1e40af"},{x:gd.shaftBi[0],y:gd.shaftBi[1],color:"#991b1b"}] });

  const sv=ch.stressVsT;
  drawPlot(CV.stressVsT,{ title:TT.stressVsT, xlabel:"torque (N·m)", ylabel:"peak stress (MPa)", ymin:0,
    series:[{x:sv.tooth.map(d=>d[0]),y:sv.tooth.map(d=>d[1]),color:C.blue,width:2,label:"tooth σ"},
            {x:sv.shaft.map(d=>d[0]),y:sv.shaft.map(d=>d[1]),color:C.black,width:2,label:"shaft τ"}],
    hlines:[{y:sv.sig_e,color:C.green,dash:[4,3]},{y:sv.tau_e,color:C.orange,dash:[4,3]}],
    vlines:[{x:state.T,color:C.green,dash:[4,3]}] });

  const fr=ch.fretting, nrm=a=>{const mx=Math.max(...a)||1; return a.map(v=>v/mx);};
  drawPlot(CV.fretting,{ title:TT.fretting, xlabel:"x (mm)", ylabel:"normalized", ymin:0,
    series:[{x:fr.fx,y:nrm(fr.press),color:C.blue,width:2,label:"pressure"},
            {x:fr.fx,y:nrm(fr.slip),color:C.green,width:2,label:"slip"},
            {x:fr.fx,y:nrm(fr.ffdp),color:C.red,width:2.5,label:"FFDP"}],
    vlines:[{x:fr.fret_site,color:C.red,dash:[5,3]}] });

  const bu=ch.bursting;
  drawPlot(CV.bursting,{ title:TT.bursting, xlabel:"torque (N·m)", ylabel:"hoop stress (MPa)", ymin:0,
    series:[{x:bu.curve.map(d=>d[0]),y:bu.curve.map(d=>d[1]),color:C.gold,width:2,label:"σ hoop"}],
    hlines:[{y:bu.sig_e,color:C.green,dash:[4,3]},{y:bu.UTS,color:C.red,dash:[4,3]}],
    vlines:[{x:state.T,color:C.green,dash:[4,3]}] });
}

buildUI(); render();
window.addEventListener("resize", render);
</script>
</body>
</html>
